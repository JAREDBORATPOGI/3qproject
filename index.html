<div class="main-box mt-4">
    <h3 class="text-center">eSakayMo Fare Matrix</h3>
    
    <div class="row mt-4">
        <div class="col-md-8">
            <label>PICK-UP LOCATION:</label>
            <select id="pickup" class="form-control mb-3">
                <option value="none">Select Station</option>
                <option value="0">North Avenue</option>
                <option value="4.1">Araneta Center-Cubao</option>
                <option value="7.8">Shaw Boulevard</option>
                <option value="12.5">Ayala</option>
                <option value="16.5">Taft Avenue</option>
            </select>

            <label>DROP-OFF LOCATION:</label>
            <select id="dropoff" class="form-control mb-3">
                <option value="none">Select Station</option>
                <option value="0">North Avenue</option>
                <option value="4.1">Araneta Center-Cubao</option>
                <option value="7.8">Shaw Boulevard</option>
                <option value="12.5">Ayala</option>
                <option value="16.5">Taft Avenue</option>
            </select>

            <button onclick="computeFare(false)" class="btn btn-warning">Regular Fare</button>
            <button onclick="computeFare(true)" class="btn btn-secondary">Discounted Fare</button>
        </div>
        
        <div class="col-md-4 text-center">
            <div class="fare-display-box">
                <h2>Fare:</h2>
                <h1 id="fareDisplay">0.00</h1>
            </div>
        </div>
    </div>
</div>
